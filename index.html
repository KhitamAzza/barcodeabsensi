<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>QR Absensi</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#111;
  color:white;
}

#reader{
  width:350px;
  margin:auto;
}

#status{
  margin-top:20px;
  font-size:22px;
}

.ok{
  color:lime;
}

.error{
  color:red;
}

</style>

</head>

<body>

<h2>Scan QR Absensi</h2>

<div id="reader"></div>

<div id="status">Menunggu scan...</div>

<audio id="beepSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
  let sendTimer = null;

const API_URL = "https://script.google.com/macros/s/AKfycbzwgwoKQNXSWn7BrwlzZe1XmVlY0JnGgA6CKY7cjVUXols6Oo_7IyBIiuVDmoQh__wO/exec";

let lastScan = 0;

const statusEl = document.getElementById("status");

const qr = new Html5Qrcode("reader");

async function startScanner(){

  const devices = await Html5Qrcode.getCameras();

  if(!devices || devices.length === 0){
    statusEl.innerText = "No camera found";
    return;
  }

  let cameraId = null;

  for(const cam of devices){

    const name = (cam.label || "").toLowerCase();

    if(
      name.includes("back") ||
      name.includes("rear") ||
      name.includes("environment")
    ){
      if(!name.includes("wide")){
        cameraId = cam.id;
        break;
      }
    }

  }

  // fallback if detection fails
  if(!cameraId){
    cameraId = devices[0].id;
  }

  qr.start(
    cameraId,
    { fps:12, qrbox:{ width:200, height:200 } },
    onScanSuccess
  );

}

function onScanSuccess(decodedText){

  const now = Date.now();

  // anti double scan
  if(now - lastScan < 2000){
    return;
  }

  lastScan = now;

  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");

  // check duplicate in queue
  let exists = scans.some(s => s.id === decodedText);

  if(!exists){

    scans.push({
      id: decodedText,
      type: "PAGI",
      time: now
    });

    localStorage.setItem("scanQueue", JSON.stringify(scans));

    // 🔊 play beep
    document.getElementById("beepSound").play();

    statusEl.className="ok";
    statusEl.innerText="✔ Scan tersimpan: " + decodedText;
// reset idle timer
clearTimeout(sendTimer);

sendTimer = setTimeout(sendQueue, 7000);
  }else{

    statusEl.className="error";
    statusEl.innerText="Duplicate scan blocked";

  }

}
function sendQueue(){

  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");

  if(scans.length === 0){
    return;
  }

  statusEl.className="";
  statusEl.innerText="Mengirim "+scans.length+" data...";

  fetch(API_URL + "?action=bulkScan",{
    method:"POST",
    body: JSON.stringify(scans)
  })
  .then(r=>r.json())
  .then(data=>{

    if(data.status === "ok"){

      localStorage.removeItem("scanQueue");

      statusEl.className="ok";
      statusEl.innerText="✔ "+scans.length+" data terkirim";

    }else{

      statusEl.className="error";
      statusEl.innerText="Server error";

    }

  })
  .catch(err=>{

    console.log(err);

    statusEl.className="error";
    statusEl.innerText="Network error (data tetap tersimpan)";

  });

}
startScanner();

</script>

</body>
</html>
