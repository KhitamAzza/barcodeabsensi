<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Absensi</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #1a120b 0%, #2c1810 50%, #1a120b 100%);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== MOBILE LAYOUT (default) ===== */
.container {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Scanner Panel - Mobile (top 45% of screen) */
.scanPanel {
  height: 45vh;
  background: linear-gradient(180deg, #e85d04 0%, #d00000 100%);
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: 0 4px 30px rgba(232, 93, 4, 0.4);
}

.scanPanel::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity: 0.3;
}

.scanPanel h3 {
  font-size: 1.5rem;
  margin-bottom: 15px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}

#reader {
  width: 280px;
  height: 280px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  border: 4px solid rgba(255,255,255,0.3);
  position: relative;
  z-index: 1;
}

/* Scanner corner accents */
#reader::before,
#reader::after {
  content: '';
  position: absolute;
  width: 40px;
  height: 40px;
  border: 4px solid #fff;
  z-index: 10;
}

#reader::before {
  top: 10px;
  left: 10px;
  border-right: none;
  border-bottom: none;
}

#reader::after {
  bottom: 10px;
  right: 10px;
  border-left: none;
  border-top: none;
}

#status {
  margin-top: 15px;
  font-size: 0.9rem;
  color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.2);
  padding: 8px 20px;
  border-radius: 20px;
  position: relative;
  z-index: 1;
}

/* Info Panel - Mobile (bottom 55%) */
.infoPanel {
  flex: 1;
  padding: 30px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(180deg, #2c1810 0%, #1a120b 100%);
}

.studentCard {
  background: linear-gradient(145deg, #2a1f1a 0%, #1f1612 100%);
  border-radius: 24px;
  padding: 30px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 
    0 20px 60px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.1);
  border: 1px solid rgba(232, 93, 4, 0.2);
  position: relative;
  overflow: hidden;
}

.studentCard::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #e85d04, #f48c06, #e85d04);
}

.studentPhoto {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 20px;
  border: 4px solid #e85d04;
  box-shadow: 0 0 20px rgba(232, 93, 4, 0.4);
  background: #3d2817;
}

.infoRow {
  margin: 12px 0;
  padding: 15px;
  background: rgba(232, 93, 4, 0.1);
  border-radius: 12px;
  border-left: 4px solid #e85d04;
}

.infoLabel {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #e85d04;
  margin-bottom: 5px;
  font-weight: 600;
}

.infoValue {
  font-size: 1.3rem;
  font-weight: 700;
  color: #fff;
}

.scanTime {
  margin-top: 20px;
  font-size: 1.1rem;
  color: #2ecc71;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.scanTime::before {
  content: '✓';
  width: 24px;
  height: 24px;
  background: #2ecc71;
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}

/* Empty state */
.emptyState {
  opacity: 0.5;
}

.emptyState .studentPhoto {
  border-color: #5d4037;
  box-shadow: none;
}

.emptyState .infoRow {
  background: rgba(93, 64, 55, 0.2);
  border-left-color: #5d4037;
}

.emptyState .infoLabel {
  color: #8d6e63;
}

/* Success animation */
@keyframes pulseSuccess {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
  70% { transform: scale(1.02); box-shadow: 0 0 0 20px rgba(46, 204, 113, 0); }
  100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
}

.success-scan {
  animation: pulseSuccess 0.6s ease-out;
}

/* ===== DESKTOP LAYOUT ===== */
@media (min-width: 769px) {
  .container {
    flex-direction: row;
  }

  .scanPanel {
    width: 35%;
    height: 100vh;
    border-right: none;
    background: linear-gradient(135deg, #e85d04 0%, #d00000 50%, #9c6644 100%);
  }

  #reader {
    width: 320px;
    height: 320px;
  }

  .infoPanel {
    flex: 1;
    padding: 60px;
    justify-content: center;
  }

  .studentCard {
    max-width: 500px;
    padding: 40px;
  }

  .studentPhoto {
    width: 140px;
    height: 140px;
  }

  .infoValue {
    font-size: 1.6rem;
  }
}

/* Loading spinner */
.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: #fff;
  animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

</div>

<script>

let students = {};
let qr;
let lastScan = 0;
let scanCount = 0;

/* Load Student Database */
async function loadStudents() {
  try {
    document.getElementById('status').innerHTML = '<span class="loading"></span> Memuat data...';
    const res = await fetch(API_URL + "?action=data");
    const data = await res.json();

    // Handle both array response and object with data property
    const studentArray = Array.isArray(data) ? data : (data.data || []);

    studentArray.forEach(s => {
      // Use nama as ID if no id field exists
      const id = s.id || s.nama;
      students[id] = s;
    });

    document.getElementById('status').innerText = 'Siap scan ✓';
    console.log('Loaded', Object.keys(students).length, 'students');
  } catch (err) {
    console.error('Load error:', err);
    document.getElementById('status').innerText = 'Gagal memuat data';
  }
}

/* Start Scanner */
async function startScanner() {
  try {
    const devices = await Html5Qrcode.getCameras();
    if (devices.length === 0) {
      document.getElementById('status').innerText = 'Kamera tidak ditemukan';
      return;
    }

    const cameraId = devices[0].id;
    qr = new Html5Qrcode("reader");

    await qr.start(
      cameraId,
      {
        fps: 12,
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1
      },
      onScanSuccess,
      onScanFailure
    );
  } catch (err) {
    console.error('Scanner error:', err);
    document.getElementById('status').innerText = 'Error: ' + err.message;
  }
}

/* Scan Success Handler */

  const now = Date.now();
  if (now - lastScan < 2000) return;
  lastScan = now;
  scanCount++;

  const beep = document.getElementById('beepSound');
  beep.currentTime = 0;
  beep.play().catch(e => console.log('Audio play failed'));

  document.getElementById('status').innerText = 'Scan #' + scanCount + ': ' + decodedText.substring(0, 20);

  try {
    await fetch(API_URL + "?action=scan&id=" + encodeURIComponent(decodedText));
  } catch (e) {
    // Silent fail - local display still works
  }
}
