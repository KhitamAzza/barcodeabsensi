<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Absensi</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family: Arial;
  text-align:center;
  background:#111;
  color:white;
}

#reader{
  width:350px;
  margin:auto;
}

#status{
  margin-top:20px;
  font-size:22px;
}

.ok{
  color:lime;
}

.error{
  color:red;
}

</style>
</head>

<body>

<h2>Scan QR Absensi</h2>

<div id="reader"></div>

<div id="status">Menunggu scan...</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzwgwoKQNXSWn7BrwlzZe1XmVlY0JnGgA6CKY7cjVUXols6Oo_7IyBIiuVDmoQh__wO/exec";

let lastScan = 0;

function onScanSuccess(decodedText){

  const now = Date.now();

  if(now - lastScan < 2000){
    return;
  }

  lastScan = now;

  document.getElementById("status").innerText =
  "Mengirim ID: " + decodedText;

  qr.stop().then(() => {

    fetch(API_URL + "?action=scan&id=" + decodedText)
    .then(r => r.json())
    .then(data => {

      if(data.status === "ok"){

        document.getElementById("status").className="ok";
        document.getElementById("status").innerText =
        "✔ " + decodedText + " → " + data.scanType;

      }else{

        document.getElementById("status").className="error";
        document.getElementById("status").innerText =
        "Server Error";

      }

      setTimeout(() => {
        qr.start(
          { facingMode:"environment" },
          { fps:10, qrbox:250 },
          onScanSuccess
        );
      },1500);

    });

  });

}

const qr = new Html5Qrcode("reader");

qr.start(
  { facingMode:"environment" },
  { fps:10, qrbox:250 },
  onScanSuccess
);

</script>

</body>
</html>
