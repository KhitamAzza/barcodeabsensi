<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Absensi</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family: Arial;
  text-align:center;
  background:#111;
  color:white;
}

#reader{
  width:350px;
  margin:auto;
}

#status{
  margin-top:20px;
  font-size:22px;
}

.ok{
  color:lime;
}

.error{
  color:red;
}

</style>
</head>

<body>

<h2>Scan QR Absensi</h2>

<div id="reader"></div>

<div id="status">Menunggu scan...</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzwgwoKQNXSWn7BrwlzZe1XmVlY0JnGgA6CKY7cjVUXols6Oo_7IyBIiuVDmoQh__wO/exec";

let lastScan = 0;

const statusEl = document.getElementById("status");

const qr = new Html5Qrcode("reader");


function startScanner(){

  qr.start(
    { facingMode:"environment" },
    { fps:15, qrbox:250 },
    onScanSuccess
  );

}


function onScanSuccess(decodedText){

  const now = Date.now();

  // anti double scan
  if(now - lastScan < 2000){
    return;
  }

  lastScan = now;

  statusEl.className = "";
  statusEl.innerText = "Mengirim ID: " + decodedText;

  qr.stop().then(() => {

    fetch(API_URL + "?action=scan&id=" + decodedText, {
      method:"GET",
      mode:"cors"
    })
    .then(res => res.json())
    .then(data => {

      if(data.status === "ok"){

        statusEl.className = "ok";
        statusEl.innerText =
        "✔ " + decodedText + " → " + data.scanType;

      }
      else{

        statusEl.className = "error";
        statusEl.innerText =
        data.message || "Server Error";

      }

      // restart scanner
      setTimeout(startScanner,1500);

    })
    .catch(err => {

      console.log(err);

      statusEl.className = "error";
      statusEl.innerText = "Network Error";

      // restart scanner even if error
      setTimeout(startScanner,2000);

    });

  });

}


// start camera
startScanner();

</script>

</body>
</html>
