<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>QR Absensi</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  background:#111;
  color:white;
}

/* CONNECTION STATUS */

#connectionStatus{
  position:fixed;
  top:10px;
  right:10px;
  font-size:16px;
  padding:6px 12px;
  border-radius:6px;
  background:#222;
}

.online{
  color:lime;
}

.offline{
  color:red;
}

/* SCANNER */

#reader{
  width:350px;
  margin:auto;
}

/* STATUS TEXT */

#status{
  margin-top:20px;
  font-size:22px;
}

.ok{
  color:lime;
}

.error{
  color:red;
}

/* LOADING OVERLAY */

#loadingOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.loader{
  border:6px solid #333;
  border-top:6px solid lime;
  border-radius:50%;
  width:60px;
  height:60px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<h2>Scan QR Absensi</h2>

<div id="connectionStatus">🟢 Online</div>

<div id="reader"></div>

<div id="status">Menunggu scan...</div>

<div id="loadingOverlay">
  <div class="loader"></div>
  <p>Mengirim data...</p>
</div>

<audio id="beepSound"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzwgwoKQNXSWn7BrwlzZe1XmVlY0JnGgA6CKY7cjVUXols6Oo_7IyBIiuVDmoQh__wO/exec";

let lastScan = 0;
let sendTimer = null;

const statusEl = document.getElementById("status");
const qr = new Html5Qrcode("reader");


/* =========================
   CONNECTION INDICATOR
========================= */

function updateConnection(){

  const el = document.getElementById("connectionStatus");

  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");

  if(navigator.onLine){

    el.className="online";
    el.innerText="🟢 Online";

  }else{

    el.className="offline";
    el.innerText="🔴 Offline ("+scans.length+" data tersimpan)";

  }

}

window.addEventListener("online",updateConnection);
window.addEventListener("offline",updateConnection);


/* =========================
   START CAMERA
========================= */

async function startScanner(){

  const devices = await Html5Qrcode.getCameras();

  if(!devices || devices.length===0){

    statusEl.innerText="No camera found";
    return;

  }

  let cameraId=null;

  for(const cam of devices){

    const name=(cam.label||"").toLowerCase();

    if(
      name.includes("back") ||
      name.includes("rear") ||
      name.includes("environment")
    ){
      if(!name.includes("wide")){
        cameraId=cam.id;
        break;
      }
    }

  }

  if(!cameraId){
    cameraId=devices[0].id;
  }

  qr.start(
    cameraId,
    {fps:12,qrbox:{width:200,height:200}},
    onScanSuccess
  );

}


/* =========================
   SCAN SUCCESS
========================= */

function onScanSuccess(decodedText){

  const now = Date.now();

  if(now-lastScan<2000){
    return;
  }

  lastScan=now;

  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");

  let exists = scans.some(s=>s.id===decodedText);

  if(!exists){

    scans.push({
      id:decodedText,
      type:"PAGI",
      time:now
    });

    localStorage.setItem("scanQueue",JSON.stringify(scans));

    document.getElementById("beepSound").play();

    statusEl.className="ok";
    statusEl.innerText="✔ Scan tersimpan: "+decodedText;

    clearTimeout(sendTimer);
    sendTimer=setTimeout(sendQueue,7000);

  }else{

    statusEl.className="error";
    statusEl.innerText="Duplicate scan blocked";

  }

  updateConnection();

}


/* =========================
   SEND QUEUE
========================= */

function sendQueue(){

  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");

  if(scans.length===0){
    return;
  }

  statusEl.className="";
  statusEl.innerText="Mengirim "+scans.length+" data...";

  document.getElementById("loadingOverlay").style.display="flex";
  document.getElementById("reader").style.display="none";

  fetch(API_URL+"?action=bulkScan",{
    method:"POST",
    body:JSON.stringify(scans)
  })

  .then(r=>r.json())

  .then(data=>{

    document.getElementById("loadingOverlay").style.display="none";
    document.getElementById("reader").style.display="block";

    if(data.status==="ok"){

      localStorage.removeItem("scanQueue");

      statusEl.className="ok";
      statusEl.innerText="✔ "+scans.length+" data terkirim";

    }else{

      statusEl.className="error";
      statusEl.innerText="Server error";

    }

    updateConnection();

  })

  .catch(err=>{

    console.log(err);

    document.getElementById("loadingOverlay").style.display="none";
    document.getElementById("reader").style.display="block";

    statusEl.className="error";
    statusEl.innerText="Network error (data tetap tersimpan)";

    updateConnection();

  });

}


/* =========================
   AUTO SEND ON PAGE LOAD
========================= */

window.addEventListener("load",()=>{

  updateConnection();

  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");

  if(scans.length>0){

    statusEl.innerText="Mengirim data tertunda...";
    sendQueue();

  }

});


/* START CAMERA */

startScanner();

</script>

</body>
</html>
