<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Scanner Test</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#111;
  color:white;
}

#reader{
  width:300px;
  margin:auto;
}

#result{
  margin-top:20px;
  font-size:20px;
  color:lime;
}
</style>

</head>

<body>

<h2>QR Scanner Test</h2>

<div id="reader"></div>

<div id="result">Scan a QR Code</div>

<script>

function onScanSuccess(decodedText, decodedResult) {

  document.getElementById("result").innerText =
  "Scanned: " + decodedText;

}

let html5QrcodeScanner = new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 },
  false
);

html5QrcodeScanner.render(onScanSuccess);

</script>

</body>
</html>
