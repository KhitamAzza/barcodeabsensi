<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>QR Absensi</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* MAIN LAYOUT */

.container{
  display:flex;
  height:100vh;
}

/* SCANNER PANEL */

.scanPanel{
  width:320px;
  padding:20px;
  border-right:2px solid #333;
}

#reader{
  width:100%;
}

/* STUDENT PANEL */

.infoPanel{
  flex:1;
  padding:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.studentCard{
  background:#1b1b1b;
  border-radius:12px;
  padding:30px;
  width:420px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.studentPhoto{
  width:120px;
  height:120px;
  border-radius:10px;
  object-fit:cover;
  margin-bottom:15px;
}

.studentID{
  font-size:18px;
  color:#aaa;
}

.studentName{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

.studentClass{
  font-size:20px;
  color:#ccc;
}

.scanTime{
  margin-top:15px;
  font-size:18px;
  color:lime;
}

/* STATUS */

#status{
  margin-top:20px;
}

/* MOBILE */

@media(max-width:800px){

.container{
  flex-direction:column;
}

.scanPanel{
  width:100%;
  border-right:none;
  border-bottom:2px solid #333;
}

.infoPanel{
  padding:20px;
}

.studentCard{
  width:90%;
}

.studentPhoto{
  width:100px;
  height:100px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- LEFT / SCANNER -->

<div class="scanPanel">

<h3>Scanner</h3>

<div id="reader"></div>

<div id="status">Menunggu scan...</div>

</div>

<!-- RIGHT / STUDENT INFO -->

<div class="infoPanel">

<div class="studentCard">

<img id="studentPhoto" class="studentPhoto"
src="https://via.placeholder.com/120">

<div id="studentID" class="studentID">ID: -</div>

<div id="studentName" class="studentName">
Belum ada scan
</div>

<div id="studentClass" class="studentClass"></div>

<div id="scanTime" class="scanTime"></div>

</div>

</div>

</div>

<audio id="beepSound"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzwgwoKQNXSWn7BrwlzZe1XmVlY0JnGgA6CKY7cjVUXols6Oo_7IyBIiuVDmoQh__wO/exec";

let students={};

const qr=new Html5Qrcode("reader");

const statusEl=document.getElementById("status");

let lastScan=0;


/* ======================
LOAD STUDENT DATABASE
====================== */

async function loadStudents(){

const res=await fetch(API_URL+"?action=data");

const data=await res.json();

data.forEach(s=>{

students[s.id]=s;

});

}


/* ======================
START SCANNER
====================== */

async function startScanner(){

const devices=await Html5Qrcode.getCameras();

const cameraId=devices[0].id;

qr.start(
cameraId,
{fps:12,qrbox:{width:200,height:200}},
onScanSuccess
);

}


/* ======================
DISPLAY STUDENT
====================== */

function displayStudent(id){

const s=students[id];

const time=new Date().toLocaleTimeString();

document.getElementById("studentID").innerText="ID: "+id;

if(!s){

document.getElementById("studentName").innerText="Unknown ID";

document.getElementById("studentClass").innerText="";

return;

}

document.getElementById("studentName").innerText=s.nama;

document.getElementById("studentClass").innerText="Kelas "+s.kelas;

document.getElementById("scanTime").innerText="Scan "+time;

if(s.foto){

document.getElementById("studentPhoto").src=s.foto;

}

}


/* ======================
SCAN SUCCESS
====================== */

function onScanSuccess(decodedText){

const now=Date.now();

if(now-lastScan<2000)return;

lastScan=now;

displayStudent(decodedText);

document.getElementById("beepSound").play();

statusEl.innerText="Scan "+decodedText;

}


/* START */

loadStudents().then(startScanner);

</script>

</body>
</html>
